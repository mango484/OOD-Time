<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOD Time</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #ffffff;
    --paper: #1a1d3a;
    --warm: #222650;
    --accent: #7eb8f7;
    --accent-light: #2a3060;
    --muted: #8b94c9;
    --line: #2e3566;
    --success: #4db88a;
    --card: #20245c;
  }

  body {
    font-family: 'Courier New', Courier, monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 39px,
      var(--line) 39px,
      var(--line) 40px
    );
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 52px;
    border-bottom: 2px solid var(--line);
    padding-bottom: 16px;
  }

  .brand {
    font-family: 'Courier New', Courier, monospace;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
  }

  .brand span {
    color: var(--accent);
  }

  .date-stamp {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* FORM */
  .entry-form {
    background: var(--card);
    border: 1.5px solid var(--line);
    padding: 32px;
    margin-bottom: 40px;
    position: relative;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
  }

  .entry-form::before {
    content: 'NEW ENTRY';
    position: absolute;
    top: -10px;
    left: 20px;
    background: var(--accent);
    color: var(--paper);
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    padding: 2px 10px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 20px 24px;
    align-items: start;
  }

  .form-row {
    display: contents;
  }

  label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding-top: 10px;
    font-weight: 500;
  }

  input, select, textarea {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.92rem;
    background: var(--paper);
    border: 1.5px solid var(--line);
    color: var(--ink);
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 2px 2px 0 var(--accent);
    background: var(--warm);
  }

  textarea {
    resize: vertical;
    min-height: 72px;
    line-height: 1.5;
  }

  .time-input-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .time-input-wrap input {
    width: 100px;
  }

  .time-unit {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  /* Project management row */
  .project-wrap {
    display: flex;
    gap: 8px;
  }

  .project-wrap select { flex: 1; }

  .btn-ghost {
    background: none;
    border: 1.5px solid var(--line);
    color: var(--muted);
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .form-actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    padding-top: 8px;
    border-top: 1px solid var(--line);
    margin-top: 4px;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--paper);
    border: 1.5px solid var(--accent);
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 28px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary:hover {
    background: #a8d4ff;
    border-color: #a8d4ff;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    transform: translate(-1px, -1px);
  }

  /* Add project modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(10,12,30,0.7);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--card);
    border: 2px solid var(--line);
    box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
    padding: 28px 32px;
    width: 360px;
    position: relative;
  }

  .modal h3 {
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 18px;
    color: var(--accent);
  }

  .modal input {
    margin-bottom: 16px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* LOG TABLE */
  .log-section {
    margin-top: 8px;
  }

  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .log-title {
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .btn-export {
    background: var(--success);
    color: var(--paper);
    border: 1.5px solid var(--success);
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .btn-export:hover {
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    transform: translate(-1px, -1px);
  }

  .btn-export:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .log-table-wrap {
    border: 1.5px solid var(--line);
    overflow-x: auto;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  thead {
    background: var(--line);
    color: var(--ink);
  }

  thead th {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    text-align: left;
    padding: 10px 14px;
  }

  tbody tr {
    border-bottom: 1px solid var(--line);
    background: var(--card);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--accent-light); }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 10px 14px;
    vertical-align: top;
    line-height: 1.4;
  }

  .td-hours {
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
  }

  .td-project {
    white-space: nowrap;
  }

  .td-notes {
    color: var(--muted);
    max-width: 260px;
    word-break: break-word;
  }

  .td-date {
    white-space: nowrap;
    color: var(--muted);
    font-size: 0.75rem;
  }

  .td-actions {
    text-align: right;
  }

  .btn-delete {
    background: none;
    border: none;
    color: var(--line);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    transition: color 0.15s;
  }

  .btn-delete:hover { color: var(--accent); }

  /* Summary bar */
  .summary-bar {
    display: flex;
    gap: 32px;
    margin-top: 20px;
    padding: 14px 18px;
    background: var(--line);
    color: var(--ink);
    font-size: 0.75rem;
    letter-spacing: 0.04em;
  }

  .summary-item { display: flex; flex-direction: column; gap: 3px; }
  .summary-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.7; }
  .summary-value { font-family: 'Courier New', Courier, monospace; font-size: 1.3rem; font-weight: 700; color: var(--accent); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    border: 1.5px dashed var(--line);
    background: var(--card);
  }

  .empty-state .empty-icon {
    font-size: 2rem;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent);
    color: var(--paper);
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    padding: 10px 20px;
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* Project color dots */
  .project-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 7px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .select-arrow-wrap { position: relative; }
  .select-arrow-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--muted);
    font-size: 0.7rem;
  }

  /* Setup banner */
  .setup-banner {
    background: var(--card);
    border-bottom: 2px solid var(--accent);
    padding: 16px 32px;
    position: relative;
    z-index: 2;
  }

  .setup-banner-inner {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    color: var(--muted);
  }

  .setup-icon { color: var(--accent); font-size: 1rem; }

  .setup-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .setup-row input {
    flex: 1;
    font-size: 0.8rem;
  }

  .setup-banner.connected {
    background: #1a3a2a;
    border-bottom-color: var(--success);
  }

  .setup-banner.connected .setup-banner-inner {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }

  .connected-label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--success);
    font-size: 0.78rem;
    letter-spacing: 0.06em;
  }

  .btn-disconnect {
    background: none;
    border: 1px solid #3a5a4a;
    color: #5a8a6a;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    cursor: pointer;
  }

  .btn-disconnect:hover { border-color: var(--accent); color: var(--accent); }

  /* Loading state */
  .loading-row td {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 24px;
    letter-spacing: 0.06em;
  }

@media (max-width: 560px) {
    .form-grid { grid-template-columns: 1fr; }
    label { padding-top: 0; }
    .container { padding: 28px 18px 60px; }
    .setup-banner { padding: 14px 18px; }
  }
</style>
</head>
<body>

<div class="setup-banner" id="setupBanner">
  <div class="setup-banner-inner">
    <span class="setup-icon">⚙</span>
    <span>Connect your Google Sheet — paste your Apps Script Web App URL:</span>
    <div class="setup-row">
      <input type="text" id="sheetUrlInput" placeholder="https://script.google.com/macros/s/...">
      <button class="btn-primary" onclick="saveSheetUrl()">Connect</button>
    </div>
  </div>
</div>

<div class="container">
  <header>
    <div class="brand">OOD <span>Time</span></div>
    <div class="date-stamp" id="dateStamp"></div>
  </header>

  <!-- ENTRY FORM -->
  <div class="entry-form">
    <div class="form-grid">
      <label for="dateInput">Date</label>
      <input type="date" id="dateInput">

      <label for="personSelect">Who</label>
      <div class="select-arrow-wrap">
        <select id="personSelect">
          <option value="">— select —</option>
          <option value="CH">CH</option>
          <option value="GF">GF</option>
        </select>
      </div>

      <label for="hoursInput">Hours</label>
      <div class="time-input-wrap">
        <input type="number" id="hoursInput" min="0" max="24" step="0.25" placeholder="0.00">
        <span class="time-unit">hrs</span>
      </div>

      <label for="projectSelect">Project</label>
      <div class="project-wrap">
        <div class="select-arrow-wrap" style="flex:1">
          <select id="projectSelect">
            <option value="">— select project —</option>
          </select>
        </div>
        <button class="btn-ghost" onclick="openProjectModal()">+ New</button>
      </div>

      <label for="notesInput">Notes</label>
      <textarea id="notesInput" placeholder="What did you work on?"></textarea>

      <div class="form-actions">
        <button class="btn-ghost" onclick="clearForm()">Clear</button>
        <button class="btn-primary" onclick="addEntry()">Log Time →</button>
      </div>
    </div>
  </div>

  <!-- LOG -->
  <div class="log-section">
    <div class="log-header">
      <div class="log-title">Time Log</div>
      <button class="btn-export" id="syncBtn" onclick="loadEntries()">
        ↻ Refresh
      </button>
    </div>

    <div id="tableWrap">
      <div class="empty-state">
        <div class="empty-icon">◷</div>
        No entries yet — log your first session above.
      </div>
    </div>

    <div class="summary-bar" id="summaryBar" style="display:none">
      <div class="summary-item">
        <span class="summary-label">Total Hours</span>
        <span class="summary-value" id="totalHours">0</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Entries</span>
        <span class="summary-value" id="totalEntries">0</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Projects</span>
        <span class="summary-value" id="totalProjects">0</span>
      </div>
    </div>
  </div>
</div>

<!-- ADD PROJECT MODAL -->
<div class="modal-backdrop" id="projectModal">
  <div class="modal">
    <h3>Add Project</h3>
    <input type="text" id="newProjectName" placeholder="Project name..." maxlength="60">
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeProjectModal()">Cancel</button>
      <button class="btn-primary" onclick="addProject()">Add Project</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Config ──────────────────────────────────────────────────
  let SHEET_URL = 'https://script.google.com/macros/s/AKfycbysL5G854DKmpQAilKk9Xkks14KaXZxVW3T8RbKZ7rVincQY_JKAKLTMg0qMcXn1H9Scg/exec';
  let entries = [];
  let projects = ['26-01 Marengo', '26-02 Venice', '26-03 Huber Haus'];
  const PROJECT_COLORS = ['#c84b2f','#3a7d4b','#2f5fc8','#8b4fc8','#c87f2f','#2f9bc8','#c82f7f'];

  // ── Init ────────────────────────────────────────────────────
  document.getElementById('dateStamp').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  renderProjectSelect();
  document.getElementById('dateInput').value = todayISO();
  showConnectedBanner();
  loadEntries();

  // ── Banner ──────────────────────────────────────────────────
  function showConnectedBanner() {
    const banner = document.getElementById('setupBanner');
    banner.classList.add('connected');
    banner.querySelector('.setup-banner-inner').innerHTML = `
      <div class="connected-label">✓ Connected to Google Sheets</div>
    `;
  }

  // ── Google Sheets API ───────────────────────────────────────
  async function loadEntries() {
    if (!SHEET_URL) return;
    showTableLoading();
    try {
      const res = await fetch(SHEET_URL + '?action=getEntries', { method: 'GET' });
      const data = await res.json();
      if (data.status === 'ok') {
        entries = data.entries.reverse().map((e) => ({
          id: e.id,
          date: e.date,
          person: e.person || '',
          hours: parseFloat(e.hours),
          project: e.project,
          notes: e.notes || ''
        }));
        renderTable();
      } else {
        showToast('Error loading entries: ' + data.message);
        renderTable();
      }
    } catch (err) {
      showToast('Could not reach Google Sheet.');
      renderTable();
    }
  }

  async function postEntry(entry) {
    // Google Apps Script requires no-cors for POST from external origins.
    // We send as a GET request with query params instead, which works reliably.
    const params = new URLSearchParams({
      action: 'addEntry',
      date: entry.date,
      person: entry.person || '',
      hours: entry.hours,
      project: entry.project,
      notes: entry.notes || ''
    });
    const res = await fetch(SHEET_URL + '?' + params.toString(), { method: 'GET' });
    return await res.json();
  }

  // ── Form ────────────────────────────────────────────────────
  function renderProjectSelect() {
    const sel = document.getElementById('projectSelect');
    const current = sel.value;
    sel.innerHTML = '<option value="">— select project —</option>';
    projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p; opt.textContent = p;
      sel.appendChild(opt);
    });
    if (current) sel.value = current;
  }

  async function addEntry() {
    if (!SHEET_URL) { showToast('Connect your Google Sheet first.'); return; }

    const dateVal = document.getElementById('dateInput').value;
    const person = document.getElementById('personSelect').value;
    const hours = parseFloat(document.getElementById('hoursInput').value);
    const project = document.getElementById('projectSelect').value;
    const notes = document.getElementById('notesInput').value.trim();

    if (!dateVal) { showToast('Please select a date.'); return; }
    if (!person) { showToast('Please select who is logging.'); return; }
    if (!hours || hours <= 0) { showToast('Please enter valid hours.'); return; }
    if (!project) { showToast('Please select a project.'); return; }

    const [y, m, d] = dateVal.split('-');
    const dateDisplay = new Date(y, m-1, d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

    const logBtn = document.querySelector('.btn-primary[onclick="addEntry()"]');
    logBtn.textContent = 'Saving...';
    logBtn.disabled = true;

    try {
      const result = await postEntry({ date: dateDisplay, person, hours, project, notes });
      if (result.status === 'ok') {
        showToast('Entry logged to Google Sheets ✓');
        clearForm();
        await loadEntries();
      } else {
        showToast('Error: ' + result.message);
      }
    } catch (err) {
      showToast('Could not save. Check your connection.');
    } finally {
      logBtn.textContent = 'Log Time →';
      logBtn.disabled = false;
    }
  }

  function clearForm() {
    document.getElementById('dateInput').value = todayISO();
    document.getElementById('personSelect').value = '';
    document.getElementById('hoursInput').value = '';
    document.getElementById('projectSelect').value = '';
    document.getElementById('notesInput').value = '';
  }

  function todayISO() {
    return new Date().toISOString().slice(0, 10);
  }

  function getProjectColor(name) {
    let hash = 0;
    for (let c of name) hash = (hash * 31 + c.charCodeAt(0)) % PROJECT_COLORS.length;
    return PROJECT_COLORS[hash];
  }

  // ── Table ───────────────────────────────────────────────────
  function showTableLoading() {
    const wrap = document.getElementById('tableWrap');
    wrap.innerHTML = `
      <div class="log-table-wrap">
        <table><thead><tr><th>Date</th><th>Hours</th><th>Project</th><th>Notes</th></tr></thead>
        <tbody><tr class="loading-row"><td colspan="4">Loading from Google Sheets...</td></tr></tbody>
        </table></div>`;
  }

  function renderTable() {
    const wrap = document.getElementById('tableWrap');
    const summaryBar = document.getElementById('summaryBar');

    if (entries.length === 0) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">◷</div>${SHEET_URL ? 'No entries yet — log your first session above.' : 'Connect your Google Sheet above to get started.'}</div>`;
      summaryBar.style.display = 'none';
      return;
    }

    summaryBar.style.display = 'flex';
    const totalHours = entries.reduce((s, e) => s + e.hours, 0);
    const uniqueProjects = new Set(entries.map(e => e.project)).size;
    document.getElementById('totalHours').textContent = totalHours % 1 === 0 ? totalHours : totalHours.toFixed(2);
    document.getElementById('totalEntries').textContent = entries.length;
    document.getElementById('totalProjects').textContent = uniqueProjects;

    const rows = entries.map(e => `
      <tr>
        <td class="td-date">${e.date}</td>
        <td class="td-person">${e.person || '<span style="opacity:0.35">—</span>'}</td>
        <td class="td-hours">${e.hours % 1 === 0 ? e.hours : e.hours.toFixed(2)}h</td>
        <td class="td-project"><span class="project-dot" style="background:${getProjectColor(e.project)}"></span>${e.project}</td>
        <td class="td-notes">${e.notes || '<span style="opacity:0.35">—</span>'}</td>
      </tr>`).join('');

    wrap.innerHTML = `
      <div class="log-table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Who</th><th>Hours</th><th>Project</th><th>Notes</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── Project modal ───────────────────────────────────────────
  function openProjectModal() {
    document.getElementById('projectModal').classList.add('open');
    setTimeout(() => document.getElementById('newProjectName').focus(), 50);
  }

  function closeProjectModal() {
    document.getElementById('projectModal').classList.remove('open');
    document.getElementById('newProjectName').value = '';
  }

  function addProject() {
    const name = document.getElementById('newProjectName').value.trim();
    if (!name) { showToast('Please enter a project name.'); return; }
    if (projects.includes(name)) { showToast('Project already exists.'); return; }
    projects.push(name);
    renderProjectSelect();
    document.getElementById('projectSelect').value = name;
    closeProjectModal();
    showToast(`"${name}" added ✓`);
  }

  document.getElementById('newProjectName').addEventListener('keydown', e => {
    if (e.key === 'Enter') addProject();
    if (e.key === 'Escape') closeProjectModal();
  });

  document.getElementById('projectModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeProjectModal();
  });

  // ── Toast ───────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
